name: Deploy Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: pip install streamlit
      
      - name: Run Streamlit
        run: streamlit run webapp.py --server.port 8501
        background: true
      
      - name: Wait for server
        run: sleep 5
      
      - name: Test deployment
        run: curl -s http://localhost:8501 | grep -q "Tic Tac Toe" && echo "Web app running!"